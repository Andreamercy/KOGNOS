apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  namespace: {{ .Release.Namespace }}
data:
  qdrantHost:      {{ .Values.qdrant.host | quote }}
  qdrantPort:      {{ .Values.qdrant.port | toString | quote }}
  qdrantCollection: {{ .Values.qdrant.collection | quote }}
  kafkaBootstrap:  {{ .Values.kafka.bootstrapServers | quote }}
  kafkaTopicFlows: {{ .Values.kafka.topicFlows | quote }}
  kafkaTopicAlerts: {{ .Values.kafka.topicAlerts | quote }}
  redisUrl:        {{ .Values.redis.url | quote }}
  anomalyThreshold: {{ .Values.api.env.ANOMALY_THRESHOLD | quote }}
  autoHealThreshold: {{ .Values.api.env.AUTO_HEAL_THRESHOLD | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  anthropicApiKey: {{ .Values.secrets.anthropicApiKey | quote }}
---
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    {{- toYaml .Values.serviceAccount.annotations | nindent 4 }}
---
# ClusterRole to allow reading pod state from k8s API
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "endpoints", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-reader
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
    namespace: {{ .Release.Namespace }}
{{- end }}
